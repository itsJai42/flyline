name: Flycomp Release

on:
  push:
    tags:
      - 'flycomp-v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-release:
    name: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Get the release version from the tag
        run: echo "VERSION=${{ github.ref_name }}" >> $GITHUB_ENV
      - name: Show the version
        run: |
          echo "version is: $VERSION"
      - name: Check that tag version and Cargo.toml version are the same
        shell: bash
        run: |
          version_no_prefix="${VERSION#flycomp-v}"
          if ! grep -q "version = \"$version_no_prefix\"" flycomp/Cargo.toml; then
            echo "version does not match flycomp/Cargo.toml" >&2
            exit 1
          fi
      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$VERSION" --draft --verify-tag --title "$VERSION"
    outputs:
      version: ${{ env.VERSION }}

  build-release:
    name: Build ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux (via cross)
          - { target: x86_64-unknown-linux-musl,  os: ubuntu-latest, build_tool: cross, bin: flycomp }
          - { target: aarch64-unknown-linux-musl, os: ubuntu-latest, build_tool: cross, bin: flycomp }
          # macOS (native cargo)
          - { target: x86_64-apple-darwin,        os: macos-latest,  build_tool: cargo, bin: flycomp }
          - { target: aarch64-apple-darwin,       os: macos-latest,  build_tool: cargo, bin: flycomp }

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.build_tool == 'cross'
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build ${{ matrix.target }}
        run: ${{ matrix.build_tool }} build --release --bin flycomp --target ${{ matrix.target }}

      - name: Prepare release artifact
        run: |
          ARCHIVE="flycomp-${{ github.ref_name }}-${{ matrix.target }}"
          echo "ARCHIVE=$ARCHIVE" >> $GITHUB_ENV

      - name: Build archive
        shell: bash
        run: |
          tar czf "$ARCHIVE.tar.gz" -C "target/${{ matrix.target }}/release" "${{ matrix.bin }}"
          shasum -a 256 "$ARCHIVE.tar.gz" > "$ARCHIVE.tar.gz.sha256"
          echo "ASSET=$ARCHIVE.tar.gz" >> $GITHUB_ENV
          echo "ASSET_SUM=$ARCHIVE.tar.gz.sha256" >> $GITHUB_ENV

      - name: Upload release archive
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          version="${{ needs.create-release.outputs.version }}"
          gh release upload "$version" ${{ env.ASSET }} ${{ env.ASSET_SUM }}

  publish-release:
    name: publish-release
    needs: [create-release, build-release]
    runs-on: ubuntu-latest
    steps:
      - name: Mark release as prerelease
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ needs.create-release.outputs.version }}" --prerelease --draft=false --repo HalFrgrd/flyline
