name: Generate Demos

on:
  push:
    branches: [ master ]
  workflow_dispatch:

concurrency:
  group: generate-demos
  cancel-in-progress: true

jobs:
  generate-demos:
    name: Generate demo assets
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout master branch
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build demo assets
        uses: docker/bake-action@v7
        with:
          files: docker-bake.hcl
          source: .
          targets: demos
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max

      - name: Upload demo assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create assets --title "assets" --notes "Demo assets storage" 2>/dev/null || true
          gh release upload assets *.svg --clobber
